  <title>CogVideoX-MANO: Joint Video and Hand Pose Diffusion</title>
  <style>
    :root {
      --fg: #1a1a1a;
      --muted: #555;
      --accent: #2a5db0;
      --bg: #fafafa;
    }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    main {
      max-width: 880px;
      margin: 0 auto;
      padding: 80px 24px 60px;
      text-align: center;
    }
    h1 {
      font-size: 36px;
      font-weight: 600;
      line-height: 1.2;
      margin: 0 0 28px;
      letter-spacing: -0.01em;
    }
    .authors {
      font-size: 18px;
      color: var(--muted);
      line-height: 1.7;
    }
    .authors a {
      color: var(--fg);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s;
    }
    .authors a:hover {
      border-bottom-color: var(--accent);
    }
    .affiliation {
      font-size: 16px;
      color: var(--muted);
      margin-top: 14px;
      font-style: italic;
    }
    @media (max-width: 600px) {
      main { padding: 50px 18px 40px; }
      h1 { font-size: 26px; }
      .authors { font-size: 16px; }
